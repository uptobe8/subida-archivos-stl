<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Baja de consentimiento</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:700px;margin:20px auto;padding:0 16px}
    input,textarea,button{width:100%;padding:10px;margin:6px 0 12px;border:1px solid #bbb;border-radius:8px}
    button{background:#d1242f;color:#fff;border:none;font-weight:700}
    .small{font-size:12px;color:#666}
  </style>
</head>
<body>
  <h1>Baja / Revocación del consentimiento</h1>
  <p>Introduce email o teléfono para registrar la baja.</p>

  <label>Email</label>
  <input id="email" type="email" placeholder="email@dominio.com" />

  <label>Teléfono</label>
  <input id="phone" type="tel" placeholder="600000000" />

  <label>Motivo (opcional)</label>
  <textarea id="reason" rows="4" placeholder="Motivo de baja"></textarea>

  <button onclick="sendRevoke()">REGISTRAR BAJA</button>
  <p id="msg" class="small"></p>

  <script>
    function sendRevoke() {
      const payload = {
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        reason: document.getElementById('reason').value,
        userAgent: navigator.userAgent,
        ip: ''
      };

      const msg = document.getElementById('msg');
      msg.textContent = 'Enviando...';

      google.script.run
        .withSuccessHandler(r => msg.textContent = r.message)
        .withFailureHandler(err => msg.textContent = 'Error: ' + err.message)
        .revokeConsent(payload);
    }
  </script>
</body>
</html>
